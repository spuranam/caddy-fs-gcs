<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>403 — Forbidden</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
			background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%);
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			color: #333;
		}

		.container {
			background: white;
			border-radius: 12px;
			box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
			padding: 60px 40px;
			text-align: center;
			max-width: 600px;
			width: 90%;
		}

		.error-code {
			font-size: 120px;
			font-weight: 700;
			color: #e67e22;
			margin-bottom: 20px;
			line-height: 1;
		}

		.error-title {
			font-size: 32px;
			font-weight: 600;
			color: #2c3e50;
			margin-bottom: 16px;
		}

		.error-description {
			font-size: 18px;
			color: #7f8c8d;
			margin-bottom: 40px;
			line-height: 1.6;
		}

		.suggestions {
			background: #f8f9fa;
			border-radius: 8px;
			padding: 24px;
			margin-bottom: 40px;
			text-align: left;
		}

		.suggestions h3 {
			color: #2c3e50;
			margin-bottom: 16px;
			font-size: 18px;
		}

		.suggestions ul {
			list-style: none;
			padding: 0;
		}

		.suggestions li {
			color: #7f8c8d;
			margin-bottom: 8px;
			padding-left: 20px;
			position: relative;
		}

		.suggestions li:before {
			content: "→";
			position: absolute;
			left: 0;
			color: #3498db;
			font-weight: bold;
		}

		.actions {
			display: flex;
			gap: 16px;
			justify-content: center;
			flex-wrap: wrap;
		}

		.btn {
			display: inline-block;
			padding: 12px 24px;
			border-radius: 6px;
			text-decoration: none;
			font-weight: 500;
			transition: all 0.3s ease;
			border: none;
			cursor: pointer;
		}

		.btn-primary {
			background: #3498db;
			color: white;
		}

		.btn-primary:hover {
			background: #2980b9;
			transform: translateY(-2px);
		}

		.btn-secondary {
			background: #ecf0f1;
			color: #2c3e50;
		}

		.btn-secondary:hover {
			background: #d5dbdb;
			transform: translateY(-2px);
		}

		@media (max-width: 768px) {
			.container {
				padding: 40px 20px;
			}

			.error-code {
				font-size: 80px;
			}

			.error-title {
				font-size: 24px;
			}

			.actions {
				flex-direction: column;
			}
		}
	</style>
</head>

<body>
	<div class="container">
		<div class="error-code">403</div>
		<h1 class="error-title">Forbidden</h1>
		<p class="error-description">
			You don't have permission to access <code>{{placeholder "http.request.orig_uri"}}</code>.
		</p>

		<div class="suggestions">
			<h3>What you can do:</h3>
			<ul>
				<li>Verify you are signed in with the correct account</li>
				<li>Contact your administrator for access</li>
				<li>Return to the homepage</li>
			</ul>
		</div>

		<div class="actions">
			<a href="/" class="btn btn-primary">Go Home</a>
			<a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
		</div>
	</div>
</body>

</html>
